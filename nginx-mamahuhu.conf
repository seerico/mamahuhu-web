server {
    listen 80;
    listen [::]:80;
    server_name mamahuhu.es www.mamahuhu.es;

    root /var/www/mamahuhu-web;
    index index.html;

    # Comprimir respuestas
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets estáticos (1 semana)
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Bloquear acceso a ficheros ocultos
    location ~ /\. {
        deny all;
    }
}
